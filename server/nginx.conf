server {
    listen       9000;
    server_name  _;

    # RAUC bundle'ы для panel target уже больше 1 GiB, поэтому дефолт 1G
    # слишком мал. Держим запас для ближайших growth'ов образа.
    client_max_body_size 4G;

    # Статическая выдача bundle'ов — быстрее, чем через Python.
    location /bundles/ {
        alias /var/lib/inauto-update/bundles/;
        autoindex off;
        add_header Cache-Control "public, max-age=3600" always;
        # 404 вместо 403 для несуществующих файлов.
        try_files $uri =404;
    }

    # Всё остальное — в FastAPI.
    location / {
        proxy_pass         http://api:9000;
        # Не буферизуем гигабайтные upload'ы в nginx temp, а стримим их в API.
        proxy_request_buffering off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
