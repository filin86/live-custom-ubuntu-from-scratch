<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Загрузка с установочного ISO-образа</title>
  <desc id="desc">Схема подключения установочной флешки и отдельной флешки для резервной копии.</desc>
  <rect width="960" height="540" fill="#f5f7fb"/>
  <rect x="80" y="70" width="800" height="400" rx="8" fill="#ffffff" stroke="#c7d0dd" stroke-width="2"/>
  <text x="120" y="125" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1b2638">1. Загрузка с установочной флешки</text>
  <text x="120" y="170" font-family="Arial, sans-serif" font-size="22" fill="#3f4c5f">В меню загрузки выберите пункт флешки с пометкой UEFI.</text>
  <rect x="135" y="235" width="210" height="115" rx="8" fill="#e9f1ff" stroke="#7da6df" stroke-width="2"/>
  <text x="150" y="285" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#163b68">Установочная флешка</text>
  <text x="160" y="320" font-family="Arial, sans-serif" font-size="18" fill="#163b68">inauto-panel-installer.iso</text>
  <rect x="610" y="235" width="210" height="115" rx="8" fill="#eef8ee" stroke="#7ab57a" stroke-width="2"/>
  <text x="628" y="285" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#235d2b">Флешка для копии</text>
  <text x="642" y="320" font-family="Arial, sans-serif" font-size="18" fill="#235d2b">папка для /home/inauto</text>
  <rect x="395" y="205" width="170" height="175" rx="12" fill="#2f3746"/>
  <rect x="420" y="225" width="120" height="85" rx="4" fill="#111827"/>
  <rect x="450" y="325" width="60" height="35" rx="4" fill="#4b5563"/>
  <text x="425" y="408" font-family="Arial, sans-serif" font-size="20" fill="#1b2638">Панель</text>
  <path d="M345 292 L395 292" stroke="#7da6df" stroke-width="5" stroke-linecap="round"/>
  <path d="M565 292 L610 292" stroke="#7ab57a" stroke-width="5" stroke-linecap="round"/>
  <text x="120" y="430" font-family="Arial, sans-serif" font-size="20" fill="#3f4c5f">После загрузки мастер Inauto Panel Installer откроется автоматически.</text>
</svg>
