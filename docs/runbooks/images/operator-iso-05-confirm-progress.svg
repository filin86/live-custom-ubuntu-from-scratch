<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Подтверждение стирания и прогресс установки</title>
  <desc id="desc">Макет окон подтверждения ERASE и хода установки.</desc>
  <rect width="960" height="540" fill="#f5f7fb"/>
  <rect x="85" y="85" width="370" height="350" rx="8" fill="#ffffff" stroke="#c7d0dd" stroke-width="2"/>
  <text x="115" y="130" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#991b1b">Будет полностью стёрт диск</text>
  <text x="115" y="175" font-family="Arial, sans-serif" font-size="18" fill="#374151">/dev/sda 128G Внутренний SSD</text>
  <text x="115" y="225" font-family="Arial, sans-serif" font-size="18" fill="#374151">Для подтверждения введите:</text>
  <rect x="115" y="245" width="245" height="44" rx="6" fill="#fef2f2" stroke="#ef4444"/>
  <text x="132" y="274" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#991b1b">ERASE</text>
  <rect x="115" y="330" width="130" height="46" rx="6" fill="#dc2626"/>
  <text x="145" y="360" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">Далее</text>
  <rect x="515" y="85" width="360" height="350" rx="8" fill="#ffffff" stroke="#c7d0dd" stroke-width="2"/>
  <text x="545" y="130" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1b2638">Прошивка панели...</text>
  <rect x="545" y="175" width="290" height="28" rx="14" fill="#e5e7eb"/>
  <rect x="545" y="175" width="205" height="28" rx="14" fill="#2563eb"/>
  <text x="545" y="245" font-family="Arial, sans-serif" font-size="18" fill="#374151">Последняя строка лога:</text>
  <text x="545" y="280" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">[установка] записываю разделы системы</text>
  <text x="545" y="330" font-family="Arial, sans-serif" font-size="18" fill="#374151">Во время установки не выключайте питание.</text>
</svg>
